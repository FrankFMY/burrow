name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build admin dashboard
        working-directory: web/admin
        run: |
          npm ci
          npm run build

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build burrow sidecar (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cd cmd/burrow
          GOOS=linux GOARCH=amd64 go build -tags "with_utls,with_quic,with_gvisor,with_wireguard" -ldflags "-s -w" -o ../../web/client/src-tauri/binaries/burrow-vpn-x86_64-unknown-linux-gnu
        env:
          CGO_ENABLED: '0'

      - name: Build burrow sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          cd cmd/burrow
          GOOS=windows GOARCH=amd64 go build -tags "with_utls,with_quic,with_gvisor,with_wireguard" -ldflags "-s -w" -o ../../web/client/src-tauri/binaries/burrow-vpn-x86_64-pc-windows-msvc.exe
        env:
          CGO_ENABLED: '0'

      - name: Build burrow sidecar (macOS arm64)
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          cd cmd/burrow
          GOOS=darwin GOARCH=arm64 go build -tags "with_utls,with_quic,with_gvisor,with_wireguard" -ldflags "-s -w" -o ../../web/client/src-tauri/binaries/burrow-vpn-aarch64-apple-darwin
        env:
          CGO_ENABLED: '0'

      - name: Build burrow sidecar (macOS x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          cd cmd/burrow
          GOOS=darwin GOARCH=amd64 go build -tags "with_utls,with_quic,with_gvisor,with_wireguard" -ldflags "-s -w" -o ../../web/client/src-tauri/binaries/burrow-vpn-x86_64-apple-darwin
        env:
          CGO_ENABLED: '0'

      - name: Install client dependencies
        working-directory: web/client
        run: npm ci

      - name: Build client frontend
        working-directory: web/client
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: web/client
          args: --target ${{ matrix.target }}
          tagName: v__VERSION__
          releaseName: v__VERSION__
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
